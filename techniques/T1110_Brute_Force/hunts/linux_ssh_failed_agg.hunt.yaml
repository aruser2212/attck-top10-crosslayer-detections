dataset: linux.auth.sshd
where:
  all:
    - { field: message, op: contains, value: "Failed password" }
aggregate:
  group_by: [source.ip, user.name]
  window: 5m
  metrics:
    - { name: fails, fn: count, field: "*" }
having:
  - { field: fails, op: gte, value: 8 }
project: [window.start, window.end, source.ip, user.name, fails]
notes: "SSH brute: ≥8 провалов по user×IP за 5 минут (подстрой порог под среду)."
