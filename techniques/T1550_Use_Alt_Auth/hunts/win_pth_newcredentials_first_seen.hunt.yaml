dataset: windows.security.logons
where:
  all:
    - { field: event.code, op: eq, value: "4624" }
    - { field: win.logon_type, op: eq, value: 9 }
    - { field: win.logon_process, op: eq, value: "seclogo" }
first_seen:
  key: [subject.user, source.ip]
  horizon: 30d
project: ["@timestamp", host.name, source.ip, subject.user, win.logon_type, win.logon_process]
notes: "PtH эвристика: новое сочетание {user × src.ip} для LT=9 (seclogo)."